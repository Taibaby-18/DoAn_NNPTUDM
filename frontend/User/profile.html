<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Của Tôi | Taibaby-18 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="px-6 md:px-12 py-12 min-h-screen">
        <div class="max-w-[800px] mx-auto">
            <h1 class="text-3xl font-black uppercase tracking-widest border-l-4 border-[#007dfc] pl-4 mb-8">Hồ Sơ Của Tôi</h1>
            
            <div id="profileContent" class="bg-[#181818] border border-gray-800 rounded-lg p-8">
                <p class="text-gray-500 animate-pulse text-center">Đang tải thông tin...</p>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        if(!token) window.location.href = '../login.html';

        function formatVND(amount) {
            const n = Number(amount) || 0;
            return `${new Intl.NumberFormat('vi-VN').format(Math.round(n))} VNĐ`;
        }

        function formatDate(dateStr) {
            if(!dateStr) return 'N/A';
            const d = new Date(dateStr);
            return d.toLocaleDateString('vi-VN');
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                if(!result.success) { 
                    localStorage.removeItem('token');
                    window.location.href = '../login.html'; 
                    return; 
                }

                const user = result.data;
                const libraryCount = user.library ? user.library.length : 0;
                
                const profileContent = document.getElementById('profileContent');
                
                profileContent.innerHTML = `
                    <div class="flex flex-col md:flex-row items-center md:items-start gap-8 border-b border-gray-800 pb-8 mb-8">
                        <div class="w-32 h-32 rounded-full bg-[#242424] border-2 border-[#007dfc] flex items-center justify-center text-5xl text-[#007dfc] font-black uppercase">
                            ${user.username.charAt(0)}
                        </div>
                        <div class="flex-1 text-center md:text-left">
                            <h2 class="text-3xl font-bold mb-2">${user.username}</h2>
                            <p class="text-gray-400 mb-4">${user.email}</p>
                            <div class="flex flex-wrap items-center justify-center md:justify-start gap-4">
                                <span class="bg-[#242424] border border-gray-700 px-4 py-2 rounded text-sm font-bold text-[#00e676]">
                                    Số dư: ${formatVND(user.walletBalance)}
                                </span>
                                <span class="bg-[#242424] border border-gray-700 px-4 py-2 rounded text-sm font-bold text-gray-300">
                                    Thư viện: ${libraryCount} Game
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-[#242424] p-6 rounded border border-gray-700 hover:border-gray-500 transition">
                            <span class="text-xs text-gray-500 font-bold uppercase mb-1 block">Tham gia từ</span>
                            <p class="font-bold text-lg text-gray-200">${formatDate(user.createdAt)}</p>
                        </div>
                        <div class="bg-[#242424] p-6 rounded border border-gray-700 hover:border-gray-500 transition">
                            <span class="text-xs text-gray-500 font-bold uppercase mb-1 block">Trạng thái tài khoản</span>
                            <div class="flex items-center gap-2">
                                <span class="w-3 h-3 rounded-full bg-[#00e676] animate-pulse"></span>
                                <p class="font-bold text-lg text-[#00e676]">Đã xác thực</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 flex flex-col md:flex-row gap-4">
                        <a href="library.html" class="flex-1 bg-[#007dfc] text-white text-center py-4 rounded font-bold uppercase tracking-widest text-sm hover:bg-[#0062c4] transition">Phòng Máy Của Tôi</a>
                        <a href="../topup.html" class="flex-1 bg-transparent border-2 border-[#007dfc] text-[#007dfc] hover:bg-[#007dfc] hover:text-white text-center py-4 rounded font-bold uppercase tracking-widest text-sm transition">Nạp Tiền Vào Ví</a>
                    </div>
                `;
            } catch (err) {
                console.error("Lỗi:", err);
                document.getElementById('profileContent').innerHTML = `<p class="text-red-500 font-bold text-center">Lỗi kết nối đến máy chủ!</p>`;
            }
        }

        init();
    </script>
    <script src="../layout.js"></script>
</body>
</html>
