<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Taibaby-18 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .epic-card {
            background-color: #181818;
        }
        
        /* Modal transition */
        .modal-fade-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .modal-fade-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s, transform 0.3s;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="max-w-[1200px] mx-auto px-6 pb-24 pt-10">
        <div class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-black uppercase tracking-tight text-white border-l-4 border-[#007dfc] pl-4">
                Quản lý người dùng
            </h1>
            <button onclick="loadUsers()" class="hover:bg-[#007dfc] bg-[#181818] border border-[#007dfc] text-[#007dfc] hover:text-white px-4 py-2 flex items-center gap-2 rounded transition font-bold text-sm uppercase">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Làm mới
            </button>
        </div>

        <div id="statusMessage" class="hidden mb-6 px-4 py-3 rounded font-bold text-sm"></div>

        <div class="overflow-x-auto epic-card rounded-lg border border-gray-800 shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#242424] text-xs uppercase text-gray-400 tracking-wider">
                        <th class="px-6 py-4 font-bold border-b border-gray-800">Tài khoản</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800">Email</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800 text-center">Vai trò</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800 text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500 animate-pulse font-bold">
                            Đang tải danh sách người dùng...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Chi tiết -->
    <div id="userDetailModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="epic-card w-full max-w-lg rounded-lg border border-gray-800 overflow-hidden shadow-2xl relative p-6 modal-fade-enter">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-2xl font-black uppercase text-white border-b border-gray-800 pb-4 mb-4 text-[#007dfc]">Chi tiết Người dùng</h2>
            <div id="modalContent" class="space-y-4 text-sm text-gray-300">
                <!-- Data will be injected here -->
            </div>
            <div class="mt-8 text-right">
                <button onclick="closeModal()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2 rounded font-bold uppercase transition text-sm">
                    Đóng
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        if (!token) window.location.href = '../login.html';
        if (userRole !== 'Admin') {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = '../index.html';
        }

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'border-red-500', 'bg-green-500/10', 'text-green-500', 'border-green-500');
            
            if (isError) {
                statusEl.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500');
            } else {
                statusEl.classList.add('bg-green-500/10', 'text-green-500', 'border', 'border-green-500');
            }

            setTimeout(() => {
                statusEl.classList.add('hidden');
            }, 5000);
        }

        function formatVND(amount) {
            const n = Number(amount) || 0;
            return `${new Intl.NumberFormat('vi-VN').format(Math.round(n))} VNĐ`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            return d.toLocaleString('vi-VN');
        }

        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500 animate-pulse font-bold">Đang tải data...</td></tr>`;

            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();

                if (!result.success) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-6 text-center text-red-500 font-bold border-t border-gray-800">${result.message || 'Lỗi lấy danh sách'}</td></tr>`;
                    return;
                }

                const users = result.data;
                if (!users || users.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-6 text-center text-gray-400 font-bold border-t border-gray-800">Chưa có người dùng nào.</td></tr>`;
                    return;
                }

                tbody.innerHTML = users.map(user => {
                    const roleName = (user.role && user.role.name) ? user.role.name : 'N/A';
                    
                    return `
                    <tr class="border-b border-gray-800 hover:bg-[#202020] transition duration-200">
                        <td class="px-6 py-4">
                            <div class="font-bold text-white">${user.username}</div>
                            <div class="text-xs text-gray-500 mt-1">ID: ${user._id}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-300">
                            ${user.email}
                        </td>
                        <td class="px-6 py-4 text-center">
                            <select onchange="updateRole('${user._id}', this.value)" class="bg-[#121212] border border-gray-700 text-gray-300 text-sm rounded focus:ring-[#007dfc] focus:border-[#007dfc] block w-full p-2 outline-none transition ${roleName === 'Admin' ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:border-gray-500'}" ${roleName === 'Admin' ? 'disabled' : ''}>
                                <option value="Gamer" ${roleName === 'Gamer' ? 'selected' : ''}>Gamer</option>
                                <option value="Publisher" ${roleName === 'Publisher' ? 'selected' : ''}>Publisher</option>
                                <option value="Admin" ${roleName === 'Admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </td>
                        <td class="px-6 py-4 text-center flex justify-center gap-3">
                            <button onclick="viewUser('${user._id}')" class="text-gray-400 hover:text-[#007dfc] transition p-1 tooltip" title="Chi tiết">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                            ${roleName !== 'Admin' ? `
                            <button onclick="deleteUser('${user._id}')" class="text-gray-400 hover:text-red-500 transition p-1 tooltip" title="Xóa tài khoản">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                            ` : `<div class="w-7"></div>`}
                        </td>
                    </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error("Lỗi:", error);
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-6 text-center text-red-500 font-bold border-t border-gray-800">Mất kết nối server</td></tr>`;
            }
        }

        async function updateRole(userId, newRoleName) {
            try {
                const res = await fetch(`${API_URL}/admin/users/${userId}/role`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ roleName: newRoleName })
                });
                const result = await res.json();
                
                if (result.success) {
                    showStatus(result.message, false);
                } else {
                    showStatus(result.message || 'Lỗi cập nhật quyền', true);
                    loadUsers(); // revert changes in UI if failed by reloading
                }
            } catch (error) {
                console.error("Lỗi update role:", error);
                showStatus('Lỗi kết nối khi cập nhật quyền', true);
                loadUsers();
            }
        }

        async function deleteUser(userId) {
            if (!confirm("Bạn có chắc chắn muốn xóa tài khoản này không? Hành động này không thể hoàn tác.")) {
                return;
            }

            try {
                const res = await fetch(`${API_URL}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                if (result.success) {
                    showStatus(result.message, false);
                    loadUsers();
                } else {
                    showStatus(result.message || 'Lỗi khi xóa người dùng', true);
                }
            } catch (error) {
                console.error("Lỗi delete:", error);
                showStatus('Lỗi kết nối khi xóa', true);
            }
        }

        async function viewUser(userId) {
            try {
                const res = await fetch(`${API_URL}/admin/users/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                if (result.success && result.data) {
                    const user = result.data;
                    const content = document.getElementById('modalContent');
                    
                    const roleName = (user.role && user.role.name) ? user.role.name : 'Không có';
                    const wallet = formatVND(user.walletBalance);
                    
                    content.innerHTML = `
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">ID:</span>
                            <span class="col-span-2 text-white break-all">${user._id}</span>
                        </div>
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">Tên người dùng:</span>
                            <span class="col-span-2 text-white font-bold">${user.username}</span>
                        </div>
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">Email:</span>
                            <span class="col-span-2 text-white">${user.email}</span>
                        </div>
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">Vai trò:</span>
                            <span class="col-span-2 text-[#00e676] font-bold uppercase text-xs self-center">${roleName}</span>
                        </div>
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">Số dư ví:</span>
                            <span class="col-span-2 text-[#007dfc] font-black">${wallet}</span>
                        </div>
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">Ngày tạo:</span>
                            <span class="col-span-2 text-white">${formatDate(user.createdAt)}</span>
                        </div>
                        <div class="grid grid-cols-3 py-2 border-b border-gray-800">
                            <span class="font-bold text-gray-400">Cập nhật lúc:</span>
                            <span class="col-span-2 text-white">${formatDate(user.updatedAt)}</span>
                        </div>
                    `;
                    
                    const modal = document.getElementById('userDetailModal');
                    const modalInner = modal.querySelector('.modal-fade-enter');
                    
                    modal.classList.remove('hidden');
                    // Trigger reflow for transition
                    void modalInner.offsetWidth;
                    modalInner.classList.add('modal-fade-enter-active');
                } else {
                    showStatus(result.message || 'Không thể tải chi tiết người dùng.', true);
                }
            } catch (error) {
                console.error("Lỗi get detail:", error);
                showStatus('Lỗi kết nối khi lấy chi tiết', true);
            }
        }

        function closeModal() {
            const modal = document.getElementById('userDetailModal');
            const modalInner = modal.querySelector('.modal-fade-enter');
            
            modalInner.classList.remove('modal-fade-enter-active');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal on click outside
        document.getElementById('userDetailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        loadUsers();
    </script>
    <script src="../layout.js"></script>
</body>

</html>
