<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh mục | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .epic-card {
            background-color: #181818;
        }
        
        /* Modal transition */
        .modal-fade-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .modal-fade-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s, transform 0.3s;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="max-w-[1200px] mx-auto px-6 pb-24 pt-10">
        <div class="mb-8 flex justify-between items-center flex-wrap gap-4">
            <h1 class="text-3xl font-black uppercase tracking-tight text-white border-l-4 border-[#007dfc] pl-4">
                Quản lý Danh mục
            </h1>
            <div class="flex items-center gap-3">
                <button onclick="loadCategories()" class="hover:bg-[#007dfc] bg-[#181818] border border-[#007dfc] text-[#007dfc] hover:text-white px-4 py-2 flex items-center gap-2 rounded transition font-bold text-sm uppercase">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Làm mới
                </button>
                <button onclick="openModal()" class="bg-[#007dfc] hover:bg-[#0062c4] text-white px-4 py-2 flex items-center gap-2 rounded transition font-bold text-sm uppercase shadow-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Thêm mới
                </button>
            </div>
        </div>

        <div id="statusMessage" class="hidden mb-6 px-4 py-3 rounded font-bold text-sm"></div>

        <div class="overflow-x-auto epic-card rounded-lg border border-gray-800 shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#242424] text-xs uppercase text-gray-400 tracking-wider">
                        <th class="px-6 py-4 font-bold border-b border-gray-800 w-1/4">Tên danh mục</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800 w-1/2">Mô tả</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800 text-center w-1/4">Hành động</th>
                    </tr>
                </thead>
                <tbody id="categoriesTableBody">
                    <tr>
                        <td colspan="3" class="px-6 py-8 text-center text-gray-500 animate-pulse font-bold">
                            Đang tải danh sách danh mục...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Thêm/Sửa Danh mục -->
    <div id="categoryModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="epic-card w-full max-w-md rounded-lg border border-gray-800 overflow-hidden shadow-2xl relative p-6 modal-fade-enter">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <h2 id="modalTitle" class="text-2xl font-black uppercase text-white border-b border-gray-800 pb-4 mb-6 text-[#007dfc]">Thêm Danh Mục</h2>
            
            <form id="categoryForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="categoryId" />
                
                <div class="mb-4">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2" for="catName">Tên Danh Mục *</label>
                    <input type="text" id="catName" required class="w-full bg-[#121212] border border-gray-700 text-white rounded px-4 py-2 outline-none focus:border-[#007dfc] transition text-sm">
                </div>
                
                <div class="mb-6">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2" for="catDesc">Mô Tả</label>
                    <textarea id="catDesc" rows="3" class="w-full bg-[#121212] border border-gray-700 text-white rounded px-4 py-2 outline-none focus:border-[#007dfc] transition text-sm resize-none"></textarea>
                </div>
                
                <div class="flex gap-3 justify-end mt-4">
                    <button type="button" onclick="closeModal()" class="bg-gray-700 hover:bg-gray-600 text-white px-5 py-2 rounded font-bold uppercase transition text-sm">
                        Hủy
                    </button>
                    <button type="submit" id="btnSubmitForm" class="bg-[#007dfc] hover:bg-[#0062c4] text-white px-5 py-2 rounded font-bold uppercase transition text-sm shadow">
                        Lưu lại
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        if (!token) window.location.href = '../login.html';
        if (userRole !== 'Admin') {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = '../index.html';
        }

        let isEditing = false;
        let categoriesData = [];

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'border-red-500', 'bg-green-500/10', 'text-green-500', 'border-green-500');
            
            if (isError) {
                statusEl.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500');
            } else {
                statusEl.classList.add('bg-green-500/10', 'text-green-500', 'border', 'border-green-500');
            }

            setTimeout(() => {
                statusEl.classList.add('hidden');
            }, 5000);
        }

        async function loadCategories() {
            const tbody = document.getElementById('categoriesTableBody');
            tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-gray-500 animate-pulse font-bold">Đang tải data...</td></tr>`;

            try {
                // Admin gets all categories including empty ones
                const res = await fetch(`${API_URL}/category`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();

                if (!result.success) {
                    tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-6 text-center text-red-500 font-bold border-t border-gray-800">${result.message || 'Lỗi lấy danh sách'}</td></tr>`;
                    return;
                }

                categoriesData = result.data;
                if (!categoriesData || categoriesData.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-6 text-center text-gray-400 font-bold border-t border-gray-800">Chưa có danh mục nào.</td></tr>`;
                    return;
                }

                tbody.innerHTML = categoriesData.map(cat => {
                    return `
                    <tr class="border-b border-gray-800 hover:bg-[#202020] transition duration-200">
                        <td class="px-6 py-4">
                            <div class="font-bold text-white text-lg">${cat.name}</div>
                            <div class="text-xs text-gray-500 mt-1">ID: ${cat._id}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-300 text-sm">
                            ${cat.description || '<span class="italic text-gray-600">Không có mô tả</span>'}
                        </td>
                        <td class="px-6 py-4 text-center flex justify-center gap-3">
                            <button onclick="openModal('${cat._id}')" class="text-gray-400 hover:text-[#007dfc] transition p-1 tooltip" title="Chỉnh sửa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="deleteCategory('${cat._id}')" class="text-gray-400 hover:text-red-500 transition p-1 tooltip" title="Xóa danh mục">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error("Lỗi:", error);
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-6 text-center text-red-500 font-bold border-t border-gray-800">Mất kết nối server</td></tr>`;
            }
        }

        async function deleteCategory(id) {
            if (!confirm("Bạn có chắc chắn muốn xóa danh mục này không? Hành động này không thể hoàn tác.")) {
                return;
            }

            try {
                const res = await fetch(`${API_URL}/category/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                if (result.success) {
                    showStatus(result.message || 'Đã xóa danh mục!', false);
                    loadCategories();
                } else {
                    showStatus(result.message || 'Lỗi khi xóa', true);
                }
            } catch (error) {
                console.error("Lỗi delete:", error);
                showStatus('Lỗi kết nối khi xóa', true);
            }
        }

        function openModal(id = null) {
            isEditing = !!id;
            const modal = document.getElementById('categoryModal');
            const title = document.getElementById('modalTitle');
            const form = document.getElementById('categoryForm');
            const catIdInput = document.getElementById('categoryId');
            const nameInput = document.getElementById('catName');
            const descInput = document.getElementById('catDesc');
            
            form.reset();
            
            if (isEditing) {
                title.textContent = "Cập Nhật Danh Mục";
                const cat = categoriesData.find(c => c._id === id);
                if (cat) {
                    catIdInput.value = cat._id;
                    nameInput.value = cat.name;
                    descInput.value = cat.description || '';
                }
            } else {
                title.textContent = "Thêm Danh Mục";
                catIdInput.value = '';
            }
            
            const modalInner = modal.querySelector('.modal-fade-enter');
            modal.classList.remove('hidden');
            void modalInner.offsetWidth;
            modalInner.classList.add('modal-fade-enter-active');
        }

        function closeModal() {
            const modal = document.getElementById('categoryModal');
            const modalInner = modal.querySelector('.modal-fade-enter');
            
            modalInner.classList.remove('modal-fade-enter-active');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitForm');
            
            const id = document.getElementById('categoryId').value;
            const name = document.getElementById('catName').value.trim();
            const description = document.getElementById('catDesc').value.trim();
            
            if (!name) {
                showStatus("Vui lòng nhập tên danh mục", true);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Đang lưu...</span>`;

            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${API_URL}/category/${id}` : `${API_URL}/category`;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, description })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    closeModal();
                    showStatus(result.message || 'Thành công!', false);
                    loadCategories();
                } else {
                    showStatus(result.message || 'Lỗi khi lưu', true);
                }
            } catch (error) {
                console.error("Lỗi submit:", error);
                showStatus('Lỗi kết nối tới server', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Lưu lại`;
            }
        }

        // Close modal on click outside
        document.getElementById('categoryModal').addEventListener('click', function(e) {
            // Only close if clicking exactly on the backdrop (not inside)
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        loadCategories();
    </script>
    <script src="../layout.js"></script>
</body>

</html>
