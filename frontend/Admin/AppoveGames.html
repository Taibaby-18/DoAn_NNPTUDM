<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Game | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .epic-card {
            background-color: #181818;
        }
        
        /* Modal transition */
        .modal-fade-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .modal-fade-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s, transform 0.3s;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="max-w-[1200px] mx-auto px-6 pb-24 pt-10">
        <div class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-black uppercase tracking-tight text-white border-l-4 border-[#007dfc] pl-4">
                Quản lý Game
            </h1>
            <button onclick="loadGames()" class="hover:bg-[#007dfc] bg-[#181818] border border-[#007dfc] text-[#007dfc] hover:text-white px-4 py-2 flex items-center gap-2 rounded transition font-bold text-sm uppercase">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Làm mới
            </button>
        </div>

        <div id="statusMessage" class="hidden mb-6 px-4 py-3 rounded font-bold text-sm"></div>

        <div class="overflow-x-auto epic-card rounded-lg border border-gray-800 shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#242424] text-xs uppercase text-gray-400 tracking-wider">
                        <th class="px-6 py-4 font-bold border-b border-gray-800 w-1/3">Tên Game</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800">Thông tin</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800 text-center">Trạng thái</th>
                        <th class="px-6 py-4 font-bold border-b border-gray-800 text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody id="gamesTableBody">
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500 animate-pulse font-bold">
                            Đang tải danh sách game...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Từ Chối -->
    <div id="rejectModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="epic-card w-full max-w-md rounded-lg border border-gray-800 overflow-hidden shadow-2xl relative p-6 modal-fade-enter">
            <button onclick="closeRejectModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-xl font-black uppercase text-red-500 border-b border-gray-800 pb-4 mb-4">Từ chối Game</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-400 mb-2">Lý do từ chối (bắt buộc):</label>
                    <textarea id="rejectReason" rows="4" class="w-full bg-[#121212] border border-gray-700 rounded p-3 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500" placeholder="Nhập lý do chi tiết để thông báo cho Publisher..."></textarea>
                </div>
                <input type="hidden" id="rejectGameId">
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeRejectModal()" class="bg-transparent border border-gray-600 hover:border-gray-400 text-white px-4 py-2 rounded font-bold uppercase transition text-sm">
                    Hủy
                </button>
                <button onclick="submitReject()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold uppercase transition text-sm">
                    Xác nhận từ chối
                </button>
            </div>
        </div>
    </div>



    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        if (!token) window.location.href = '../login.html';
        if (userRole !== 'Admin') {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = '../index.html';
        }

        let allGames = [];

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'border-red-500', 'bg-green-500/10', 'text-green-500', 'border-green-500');
            
            if (isError) {
                statusEl.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500');
            } else {
                statusEl.classList.add('bg-green-500/10', 'text-green-500', 'border', 'border-green-500');
            }

            setTimeout(() => {
                statusEl.classList.add('hidden');
            }, 5000);
        }

        function formatVND(amount) {
            const n = Number(amount) || 0;
            return `${new Intl.NumberFormat('vi-VN').format(Math.round(n))} VNĐ`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            return d.toLocaleString('vi-VN');
        }

        function getStatusBadge(status) {
            if (status === 'approved') return '<span class="px-2 py-1 bg-green-500/10 text-[#00e676] border border-[#00e676] rounded text-xs font-bold uppercase">Đã duyệt</span>';
            if (status === 'rejected') return '<span class="px-2 py-1 bg-red-500/10 text-red-500 border border-red-500 rounded text-xs font-bold uppercase">Đã từ chối</span>';
            if (status === 'pending') return '<span class="px-2 py-1 bg-yellow-500/10 text-yellow-500 border border-yellow-500 rounded text-xs font-bold uppercase animate-pulse">Chờ duyệt</span>';
            return `<span class="px-2 py-1 bg-gray-500/10 text-gray-400 border border-gray-500 rounded text-xs font-bold uppercase">${status}</span>`;
        }

        async function loadGames() {
            const tbody = document.getElementById('gamesTableBody');
            tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500 animate-pulse font-bold">Đang tải data...</td></tr>`;

            try {
                const res = await fetch(`${API_URL}/admin/games`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();

                if (!result.success) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-6 text-center text-red-500 font-bold border-t border-gray-800">${result.message || 'Lỗi lấy danh sách game'}</td></tr>`;
                    return;
                }

                allGames = result.data || [];
                if (allGames.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-6 text-center text-gray-400 font-bold border-t border-gray-800">Chưa có game nào trong hệ thống.</td></tr>`;
                    return;
                }

                renderGames();

            } catch (error) {
                console.error("Lỗi:", error);
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-6 text-center text-red-500 font-bold border-t border-gray-800">Mất kết nối server</td></tr>`;
            }
        }

        function renderGames() {
            const tbody = document.getElementById('gamesTableBody');
            tbody.innerHTML = allGames.map(game => {
                const publisherName = (game.publisher && game.publisher.name) ? game.publisher.name : 'Unknown';
                const catName = (game.category && game.category.name) ? game.category.name : 'Unknown';
                const isPending = game.status === 'pending';
                return `
                <tr class="border-b border-gray-800 hover:bg-[#202020] transition duration-200">
                    <td class="px-6 py-4">
                        <div>
                            <div class="font-bold text-white text-base hover:text-[#007dfc] cursor-pointer transition" onclick="viewGameDetail('${game._id}')">${game.title}</div>
                            <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider">${catName}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-gray-300 text-sm">
                        <div><span class="text-gray-500">NSX:</span> <span class="font-bold">${publisherName}</span></div>
                        <div class="mt-1"><span class="text-gray-500">Giá:</span> <span class="text-[#007dfc] font-black">${game.price === 0 ? 'MIỄN PHÍ' : formatVND(game.price)}</span></div>
                        <div class="mt-1 text-xs text-gray-500">${formatDate(game.createdAt)}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${getStatusBadge(game.status)}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex justify-center gap-2">
                            ${isPending ? `
                                <button onclick="approveGame('${game._id}')" class="bg-[#00e676]/20 hover:bg-[#00e676]/30 text-[#00e676] border border-[#00e676]/50 px-3 py-1.5 rounded text-xs font-bold uppercase transition tooltip" title="Duyệt">
                                    <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                    Duyệt
                                </button>
                                <button onclick="openRejectModal('${game._id}')" class="bg-red-500/20 hover:bg-red-500/30 text-red-500 border border-red-500/50 px-3 py-1.5 rounded text-xs font-bold uppercase transition tooltip" title="Từ chối">
                                    <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    Từ chối
                                </button>
                            ` : `
                                <button onclick="viewGameDetail('${game._id}')" class="bg-[#242424] hover:bg-[#333] text-gray-300 border border-gray-700 px-3 py-1.5 rounded text-xs font-bold uppercase transition">
                                    Chi tiết
                                </button>
                            `}
                        </div>
                    </td>
                </tr>
                `;
            }).join('');
        }

        async function approveGame(gameId) {
            if (!confirm("Bạn có chắc chắn muốn duyệt game này? Game sẽ được hiển thị trên cửa hàng.")) return;

            try {
                const res = await fetch(`${API_URL}/admin/games/${gameId}/approve`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                if (result.success) {
                    showStatus(result.message, false);
                    loadGames();
                } else {
                    showStatus(result.message || 'Lỗi duyệt game', true);
                }
            } catch (error) {
                console.error("Lỗi duyệt game:", error);
                showStatus('Lỗi kết nối khi duyệt', true);
            }
        }

        function openRejectModal(gameId) {
            document.getElementById('rejectGameId').value = gameId;
            document.getElementById('rejectReason').value = '';
            
            const modal = document.getElementById('rejectModal');
            const modalInner = modal.querySelector('.modal-fade-enter');
            
            modal.classList.remove('hidden');
            // Trigger reflow for transition
            void modalInner.offsetWidth;
            modalInner.classList.add('modal-fade-enter-active');
            
            document.getElementById('rejectReason').focus();
        }

        function closeRejectModal() {
            const modal = document.getElementById('rejectModal');
            const modalInner = modal.querySelector('.modal-fade-enter');
            
            modalInner.classList.remove('modal-fade-enter-active');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        async function submitReject() {
            const gameId = document.getElementById('rejectGameId').value;
            const reason = document.getElementById('rejectReason').value.trim();

            if (!reason) {
                alert("Vui lòng nhập lý do từ chối!");
                document.getElementById('rejectReason').focus();
                return;
            }

            try {
                const res = await fetch(`${API_URL}/admin/games/${gameId}/reject`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ reason })
                });
                const result = await res.json();
                
                if (result.success) {
                    showStatus(result.message, false);
                    closeRejectModal();
                    loadGames();
                } else {
                    showStatus(result.message || 'Lỗi từ chối game', true);
                }
            } catch (error) {
                console.error("Lỗi từ chối game:", error);
                showStatus('Lỗi kết nối khi từ chối', true);
            }
        }

        function viewGameDetail(gameId) {
            window.location.href = `GameDetail.html?id=${gameId}`;
        }

        // Close modals on click outside
        document.getElementById('rejectModal').addEventListener('click', function(e) {
            if (e.target === this) closeRejectModal();
        });

        // Initialize
        loadGames();
    </script>
    <script src="../layout.js"></script>
</body>

</html>
