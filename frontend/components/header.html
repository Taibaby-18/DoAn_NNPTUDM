<header class="bg-[#181818] border-b border-gray-800">
    <div class="max-w-[1200px] mx-auto px-6 h-20 flex items-center justify-between relative">

        <a href="/index.html"
            class="flex items-center gap-2 text-2xl font-black uppercase tracking-tighter hover:text-[#007dfc] transition">
            <span class="text-[#007dfc]">TAIBABY</span> STORE
        </a>

        <nav
            class="hidden md:flex absolute left-1/2 -translate-x-1/2 items-center gap-8 font-bold text-sm uppercase tracking-widest text-gray-300">

            <a href="/topup.html" class="hover:text-white transition">Nạp ví</a>

            <a href="/User/cart.html" class="hover:text-white transition">Giỏ hàng</a>
        </nav>

        <div class="flex items-center gap-4">
            <div id="userMenu" class="relative hidden items-center">
                <button id="userDropdownBtn" class="flex items-center gap-2 focus:outline-none cursor-pointer">
                    <div class="text-right flex flex-col justify-center">
                        <span id="userName" class="font-bold text-sm uppercase hover:text-[#007dfc] transition"></span>
                        <span id="userBalance" class="text-xs text-[#00e676] font-bold"></span>
                    </div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                <div id="userDropdown"

                        class="block px-4 py-2 text-sm text-gray-300 hover:bg-[#333] hover:text-white transition rounded-t">Xem

                    <button onclick="logout()"

                </div>
            </div>
            <a id="loginBtn" href="/login.html"
                class="bg-[#007dfc] hover:bg-[#0062c4] text-white px-6 py-2 rounded font-bold uppercase text-sm transition hidden">Đăng
