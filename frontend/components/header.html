<!-- header.html -->
<header class="bg-[#181818] border-b border-gray-800">
    <div class="max-w-[1200px] mx-auto px-6 h-20 flex items-center justify-between">
        <!-- Logo -->
        <a href="/frontend/index.html" class="flex items-center gap-2 text-2xl font-black uppercase tracking-tighter hover:text-[#007dfc] transition">
            <span class="text-[#007dfc]">TAIBABY</span> STORE
        </a>
        
        <!-- Navigation -->
        <nav class="hidden md:flex items-center gap-8 font-bold text-sm uppercase tracking-widest text-gray-300">
            <a href="/frontend/index.html" class="hover:text-white transition">Cửa hàng</a>
            <a href="/frontend/topup.html" class="hover:text-white transition">Nạp ví</a>
            <a href="/frontend/User/library.html" class="hover:text-white transition">Thư viện Game</a>
            <a href="/frontend/User/cart.html" class="hover:text-white transition">Giỏ hàng</a>
        </nav>
        
        <!-- Auth / User -->
        <div class="flex items-center gap-4">
            <div id="userMenu" class="relative hidden items-center">
                <!-- User Info Trigger -->
                <button id="userDropdownBtn" class="flex items-center gap-2 focus:outline-none cursor-pointer">
                    <div class="text-right flex flex-col justify-center">
                        <span id="userName" class="font-bold text-sm uppercase hover:text-[#007dfc] transition"></span>
                        <span id="userBalance" class="text-xs text-[#00e676] font-bold"></span>
                    </div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                
                <!-- Dropdown Menu -->
                <div id="userDropdown" class="absolute right-0 top-full mt-2 w-48 bg-[#242424] border border-gray-700 rounded shadow-lg hidden z-50">
                    <a href="/frontend/User/profile.html" class="block px-4 py-2 text-sm text-gray-300 hover:bg-[#333] hover:text-white transition rounded-t">Xem Profile</a>
                    <button onclick="logout()" class="w-full text-left block px-4 py-2 text-sm text-red-500 hover:bg-[#333] hover:text-red-400 transition rounded-b border-t border-gray-700">Đăng Xuất</button>
                </div>
            </div>
            <a id="loginBtn" href="/frontend/login.html" class="bg-[#007dfc] hover:bg-[#0062c4] text-white px-6 py-2 rounded font-bold uppercase text-sm transition hidden">Đăng Nhập</a>
        </div>
    </div>
</header>

<script>
    // Kiểm tra xem đã đăng nhập chưa
    const userMenu = document.getElementById('userMenu');
    if (localStorage.getItem('token')) {
        userMenu.classList.remove('hidden');
        userMenu.classList.add('flex');
    } else {
        document.getElementById('loginBtn').classList.remove('hidden');
    }
    
    // Dropdown toggle
    const userDropdownBtn = document.getElementById('userDropdownBtn');
    const userDropdown = document.getElementById('userDropdown');
    
    if (userDropdownBtn) {
        userDropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userDropdown.classList.toggle('hidden');
        });
        
        document.addEventListener('click', (e) => {
            if (!userMenu.contains(e.target)) {
                userDropdown.classList.add('hidden');
            }
        });
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/frontend/login.html';
    }
</script>
