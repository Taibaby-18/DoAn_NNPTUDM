<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thư Viện | Taibaby-18 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; }
        .epic-card { background-color: #181818; transition: 0.3s; }
        .epic-card:hover { background-color: #252525; }
    </style>
</head>
<body>
    <nav class="bg-[#181818] p-4 flex justify-between items-center px-12 sticky top-0 z-50 border-b border-gray-800">
        <div class="flex items-center gap-8">
            <span class="text-xl font-black tracking-widest text-white">TAIBABY-18 STORE</span>
            <a href="index.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Khám phá</a>
            <a href="cart.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Giỏ hàng</a>
            <a href="library.html" class="text-white uppercase text-xs font-bold border-b-2 border-white pb-1">Thư viện</a>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="userName" class="text-sm font-bold uppercase">OPERATOR</p>
                <p id="userBalance" class="text-[#007dfc] text-xs font-bold">$0.00</p>
            </div>
            <button onclick="logout()" class="bg-gray-800 px-3 py-1 text-xs rounded hover:bg-red-600 transition">Thoát</button>
        </div>
    </nav>

    <main class="px-12 py-12 min-h-screen">
        <div class="flex justify-between items-end mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-black uppercase tracking-widest border-l-4 border-[#007dfc] pl-4">Kho Game Của Tôi</h1>
            <p class="text-gray-400 text-sm">Tổng số: <span id="gameCount" class="font-bold text-white">0</span> game</p>
        </div>
        
        <div id="libraryGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <p class="text-gray-500 animate-pulse col-span-full">Đang kết nối đến kho dữ liệu...</p>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        if(!token) window.location.href = 'login.html';

        async function init() {
            try {
                // Lấy Profile (Bao gồm luôn cả mảng thư viện game)
                const res = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                if(!result.success) { logout(); return; }

                const user = result.data;
                document.getElementById('userName').innerText = user.username;
                const balance = user.walletBalance || 0;
                document.getElementById('userBalance').innerText = `$${balance.toFixed(2)}`;

                const library = user.library || []; // Mảng chứa các game đã mua
                document.getElementById('gameCount').innerText = library.length;

                const grid = document.getElementById('libraryGrid');

                if(library.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-[#181818] rounded-lg border border-gray-800">
                            <span class="material-symbols-outlined text-6xl text-gray-600 mb-4 block">sports_esports</span>
                            <h2 class="text-xl font-bold mb-2">Thư viện của bạn đang trống</h2>
                            <p class="text-gray-400 mb-6">Hãy dạo một vòng cửa hàng để tìm cho mình tựa game yêu thích nhé!</p>
                            <a href="index.html" class="bg-[#007dfc] text-white px-8 py-3 rounded font-bold hover:bg-[#0062c4] transition uppercase text-sm">Đi tới Cửa hàng</a>
                        </div>
                    `;
                    return;
                }

                // Render danh sách game đã mua
                grid.innerHTML = library.map(game => {
                    // Chống crash hình ảnh như cũ
                    let imgSrc = 'https://via.placeholder.com/400x500/202020/007dfc?text=TAIBABY-18+STORE';
                    if (game.thumbnail) imgSrc = game.thumbnail.startsWith('http') ? game.thumbnail : `${API_URL.replace('/api', '')}${game.thumbnail}`;
                    else if (game.imageUrl) imgSrc = game.imageUrl.startsWith('http') ? game.imageUrl : `${API_URL.replace('/api', '')}${game.imageUrl}`;

                    const title = game.title || 'Game ẩn danh';

                    return `
                    <div class="epic-card p-3 rounded-lg flex flex-col group relative border border-gray-800 h-full">
                        <a href="detail.html?id=${game._id}" class="flex flex-col flex-grow">
                            <div class="w-full aspect-[3/4] bg-[#202020] rounded mb-3 overflow-hidden relative">
                                <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/400x500/202020/007dfc?text=TAIBABY-18+STORE'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 filter grayscale-[20%] group-hover:grayscale-0">
                                <div class="absolute top-2 right-2 bg-black/80 px-2 py-1 rounded text-[10px] font-bold text-gray-300 border border-gray-700">ĐÃ SỞ HỮU</div>
                            </div>
                            <h4 class="font-bold text-sm group-hover:text-[#007dfc] transition line-clamp-2 truncate">${title}</h4>
                        </a>
                        
                        <div class="mt-auto pt-3">
                            <button onclick="playGame('${title}')" class="w-full bg-gray-800 text-white py-2 rounded font-bold text-xs group-hover:bg-white group-hover:text-black transition uppercase tracking-widest">
                                Khởi động
                            </button>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Lỗi:", err);
                document.getElementById('libraryGrid').innerHTML = `<p class="text-red-500 col-span-full">Lỗi kết nối đến máy chủ!</p>`;
            }
        }

        function playGame(gameName) {
            alert(`Đang khởi động ${gameName}... Hệ thống Taibaby-18 đang nạp dữ liệu!`);
        }

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        init();
    </script>
</body>
</html>
