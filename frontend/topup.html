<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Ví | Taibaby-18 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; }
        .epic-btn { background-color: #007dfc; transition: 0.3s; }
        .epic-btn:hover { background-color: #0062c4; }
        .epic-input { background-color: #202020; border: 1px solid #333; transition: 0.3s; }
        .epic-input:focus { border-color: #007dfc; outline: none; background-color: #2a2a2a; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="max-w-[600px] mx-auto py-16 px-6">
        <h1 class="text-3xl font-black italic mb-8 uppercase border-l-4 border-[#007dfc] pl-4">Nạp tiền vào ví</h1>

        <div class="bg-[#181818] p-8 rounded-lg border border-gray-800 shadow-xl space-y-6">
            <div>
                <p class="text-gray-400 text-sm mb-1">Số dư hiện tại</p>
                <p id="currentBalance" class="text-3xl font-black text-[#00e676]">$0.00</p>
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-2">Số tiền cần nạp (VNĐ)</label>
                <input id="amount" type="number" min="1000" step="1000" value="50000"
                       class="w-full epic-input p-4 rounded text-lg"
                       placeholder="Ví dụ: 50000">
                <p class="text-xs text-gray-500 mt-1">Demo MoMo sandbox, nên ưu tiên số tròn: 50.000, 100.000,...</p>
            </div>

            <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

            <button onclick="loadQR()" class="w-full epic-btn text-white font-bold py-4 rounded uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all">
                Nạp qua ngân hàng (QR)
            </button>

            <div id="qrBox" class="hidden mt-6 text-center space-y-4">
                <p id="bankInfo"></p>
                <p id="contentInfo" class="text-yellow-400 font-bold"></p>
                <img id="qrImage" class="mx-auto rounded-lg border border-gray-700" width="250"/>
            </div>

            <p class="text-gray-500 text-xs text-center">
                Sau khi thanh toán xong, VNPay sẽ chuyển bạn về trang kết quả để xác nhận và cập nhật số dư ví.
            </p>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        function formatVND(amount) {
            const n = Number(amount) || 0;
            return `${new Intl.NumberFormat('vi-VN').format(Math.round(n))} VNĐ`;
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profile = await res.json();
                if (!profile.success) { logout(); return; }

                const user = profile.data;
                const userNameEl = document.getElementById('userName');
                if (userNameEl) userNameEl.innerText = user.username;
                const balance = user.walletBalance || 0;
                const formatted = formatVND(balance);
                const userBalanceEl = document.getElementById('userBalance');
                if (userBalanceEl) userBalanceEl.innerText = formatted;
                document.getElementById('currentBalance').innerText = formatted;
            } catch (e) {
                console.error(e);
            }
        }

        async function createMoMoPayment() {
            const errorEl = document.getElementById('errorMsg');
            errorEl.classList.add('hidden');
            const amountInput = document.getElementById('amount');
            const amount = Number(amountInput.value);

            if (!Number.isFinite(amount) || amount <= 0) {
                errorEl.innerText = "Số tiền nạp không hợp lệ.";
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const body = { amount };
                const res = await fetch(`${API_URL}/payment/create_payment_url`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!data.success) {
                    errorEl.innerText = data.message || "Tạo giao dịch VNPay thất bại.";
                    errorEl.classList.remove('hidden');
                    return;
                }

                const payUrl = data.data; // Server returns vnpUrl as data

                if (payUrl) {
                    window.location.href = payUrl;
                } else {
                    errorEl.innerText = "Không tìm thấy URL thanh toán VNPay.";
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.innerText = "Lỗi kết nối server hoặc VNPay.";
                errorEl.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        //tải qr
        async function loadQR() {
            const errorEl = document.getElementById('errorMsg');
            errorEl.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/wallet/topup/qr`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await res.json();

                if (!data.qrUrl) {
                    errorEl.innerText = "Không lấy được QR.";
                    errorEl.classList.remove('hidden');
                    return;
                }

                document.getElementById('qrBox').classList.remove('hidden');
                document.getElementById('qrImage').src = data.qrUrl;

                document.getElementById('bankInfo').innerText =
                    `Ngân hàng: ${data.bank} | STK: ${data.accountNumber}`;

                document.getElementById('contentInfo').innerText =
                    `Nội dung: ${data.content}`;

            } catch (err) {
                console.error(err);
                errorEl.innerText = "Lỗi tải QR.";
                errorEl.classList.remove('hidden');
            }
        }


        init();
        </script>
        <script src="./layout.js"></script>
</body>
</html>
