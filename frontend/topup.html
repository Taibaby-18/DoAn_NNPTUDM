<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Ví | Taibaby-18 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; }
        .epic-btn { background-color: #007dfc; transition: 0.3s; }
        .epic-btn:hover { background-color: #0062c4; }
        .epic-input { background-color: #202020; border: 1px solid #333; transition: 0.3s; }
        .epic-input:focus { border-color: #007dfc; outline: none; background-color: #2a2a2a; }
    </style>
</head>
<body>
    <nav class="bg-[#181818] p-4 flex justify-between items-center px-12 sticky top-0 z-50 border-b border-gray-800">
        <div class="flex items-center gap-8">
            <span class="text-xl font-black tracking-widest text-white">TAIBABY-18 STORE</span>
            <a href="index.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Khám phá</a>
            <a href="cart.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Giỏ hàng</a>
            <a href="library.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Thư viện</a>
            <a href="topup.html" class="text-white uppercase text-xs font-bold border-b-2 border-white pb-1">Nạp ví</a>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="userName" class="text-sm font-bold uppercase">OPERATOR</p>
                <p id="userBalance" class="text-[#007dfc] text-xs font-bold">$0.00</p>
            </div>
            <button onclick="logout()" class="bg-gray-800 px-3 py-1 text-xs rounded hover:bg-red-600 transition">Thoát</button>
        </div>
    </nav>

    <main class="max-w-[600px] mx-auto py-16 px-6">
        <h1 class="text-3xl font-black italic mb-8 uppercase border-l-4 border-[#007dfc] pl-4">Nạp tiền vào ví</h1>

        <div class="bg-[#181818] p-8 rounded-lg border border-gray-800 shadow-xl space-y-6">
            <div>
                <p class="text-gray-400 text-sm mb-1">Số dư hiện tại</p>
                <p id="currentBalance" class="text-3xl font-black text-[#00e676]">$0.00</p>
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-2">Số tiền cần nạp (VNĐ)</label>
                <input id="amount" type="number" min="1000" step="1000" value="50000"
                       class="w-full epic-input p-4 rounded text-lg"
                       placeholder="Ví dụ: 50000">
                <p class="text-xs text-gray-500 mt-1">Demo MoMo sandbox, nên ưu tiên số tròn: 50.000, 100.000,...</p>
            </div>

            <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

            <button onclick="createMoMoPayment()" class="w-full epic-btn text-white font-bold py-4 rounded uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all">
                Nạp qua MoMo
            </button>

            <p class="text-gray-500 text-xs text-center">
                Sau khi quét mã/thanh toán xong, MoMo sẽ chuyển bạn về trang kết quả để xác nhận và cập nhật số dư ví.
            </p>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        function formatVND(amount) {
            const n = Number(amount) || 0;
            return `${new Intl.NumberFormat('vi-VN').format(Math.round(n))} VNĐ`;
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profile = await res.json();
                if (!profile.success) { logout(); return; }

                const user = profile.data;
                document.getElementById('userName').innerText = user.username;
                const balance = user.walletBalance || 0;
                const formatted = formatVND(balance);
                document.getElementById('userBalance').innerText = formatted;
                document.getElementById('currentBalance').innerText = formatted;
            } catch (e) {
                console.error(e);
            }
        }

        async function createMoMoPayment() {
            const errorEl = document.getElementById('errorMsg');
            errorEl.classList.add('hidden');
            const amountInput = document.getElementById('amount');
            const amount = Number(amountInput.value);

            if (!Number.isFinite(amount) || amount <= 0) {
                errorEl.innerText = "Số tiền nạp không hợp lệ.";
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const body = { amount };
                const res = await fetch(`${API_URL}/wallet/momo/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!data.success) {
                    errorEl.innerText = data.message || "Tạo giao dịch MoMo thất bại.";
                    errorEl.classList.remove('hidden');
                    return;
                }

                const momo = data.data.momo || {};
                const payUrl = momo.payUrl || momo.shortLink || momo.deeplink;

                if (payUrl) {
                    window.location.href = payUrl;
                } else {
                    errorEl.innerText = "Không tìm thấy payUrl từ MoMo.";
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.innerText = "Lỗi kết nối server hoặc MoMo.";
                errorEl.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        init();
    </script>
</body>
</html>
