<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Game | Publisher | Taibaby-18 Store</title>
    <meta name="description" content="Trang quản lý game dành cho Publisher - Tạo, xem và chỉnh sửa game của bạn.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .epic-card {
            background-color: #181818;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
        }

        /* Status badges */
        .badge-pending {
            background: rgba(255, 171, 0, 0.15);
            color: #ffab00;
            border: 1px solid rgba(255, 171, 0, 0.3);
        }

        .badge-approved {
            background: rgba(0, 230, 118, 0.15);
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .badge-rejected {
            background: rgba(255, 82, 82, 0.15);
            color: #ff5252;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        /* Modal */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
        }

        .modal-box {
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Game card hover */
        .game-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .game-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 125, 252, 0.15);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #181818;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #007dfc;
        }

        /* Form input */
        .form-input {
            background: #121212;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 6px;
            padding: 10px 12px;
            width: 100%;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #007dfc;
        }

        .form-input::placeholder {
            color: #555;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
            margin-bottom: 6px;
        }



        /* Stats card */
        .stat-card {
            background: linear-gradient(135deg, #181818 0%, #1e1e1e 100%);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }

        .stat-card:hover {
            border-color: #007dfc;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="max-w-[1280px] mx-auto px-6 pb-24 pt-10">
        <div class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-white border-l-4 border-[#007dfc] pl-4">
                    Quản lý Game
                </h1>
                <p class="text-gray-400 text-sm mt-1 pl-5">Tạo, xem và chỉnh sửa các game của bạn</p>
            </div>
            <a href="CreateGame.html"
                class="flex items-center gap-2 bg-[#007dfc] hover:bg-[#0062c4] text-white px-6 py-3 rounded-lg font-bold uppercase text-sm transition active:scale-95">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Tạo Game Mới
            </a>
        </div>

        <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
            <div class="stat-card text-center">
                <div id="statTotal" class="text-3xl font-black text-white">—</div>
                <div class="text-xs font-bold text-gray-500 uppercase mt-1">Tổng game</div>
            </div>
            <div class="stat-card text-center">
                <div id="statApproved" class="text-3xl font-black text-[#00e676">—</div>
                <div class="text-xs font-bold text-gray-500 uppercase mt-1">Đã duyệt</div>
            </div>
            <div class="stat-card text-center">
                <div id="statPending" class="text-3xl font-black text-[#ffab00">—</div>
                <div class="text-xs font-bold text-gray-500 uppercase mt-1">Chờ duyệt</div>
            </div>
            <div class="stat-card text-center">
                <div id="statRejected" class="text-3xl font-black text-[#ff5252">—</div>
                <div class="text-xs font-bold text-gray-500 uppercase mt-1">Bị từ chối</div>
            </div>
        </div>

        <div id="statusMessage" class="hidden mb-6 px-4 py-3 rounded-lg font-bold text-sm border"></div>

        <div class="flex flex-col sm:flex-row gap-3 mb-6">
            <input id="searchInput" type="text" placeholder="🔍  Tìm kiếm tên game..." class="form-input max-w-xs"
                oninput="filterGames()">
            <select id="filterStatus" class="form-input max-w-[180px]" onchange="filterGames()">
                <option value="">Tất cả trạng thái</option>
                <option value="pending">Chờ duyệt</option>
                <option value="approved">Đã duyệt</option>
                <option value="rejected">Bị từ chối</option>
            </select>
            <button onclick="loadMyGames()" title="Làm mới"
                class="flex items-center gap-2 border border-[#2a2a2a] hover:border-[#007dfc] text-gray-400 hover:text-[#007dfc] px-4 py-2 rounded-lg transition text-sm font-bold uppercase">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Làm mới
            </button>
        </div>

        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            <div class="game-card glass-card rounded-xl overflow-hidden animate-pulse">
                <div class="bg-[#222] h-44 w-full"></div>
                <div class="p-4 space-y-2">
                    <div class="h-4 bg-[#222] rounded w-3/4"></div>
                    <div class="h-3 bg-[#222] rounded w-1/2"></div>
                    <div class="h-3 bg-[#222] rounded w-1/3"></div>
                </div>
            </div>
            <div class="game-card glass-card rounded-xl overflow-hidden animate-pulse">
                <div class="bg-[#222] h-44 w-full"></div>
                <div class="p-4 space-y-2">
                    <div class="h-4 bg-[#222] rounded w-3/4"></div>
                    <div class="h-3 bg-[#222] rounded w-1/2"></div>
                    <div class="h-3 bg-[#222] rounded w-1/3"></div>
                </div>
            </div>
        </div>
    </main>



    <div id="editModal"
        class="fixed inset-0 modal-overlay z-[100] hidden flex items-start justify-center overflow-y-auto py-10">
        <div class="modal-box epic-card w-full max-w-2xl rounded-xl border border-gray-800 shadow-2xl relative mx-4">
            <div class="flex items-center justify-between px-6 py-5 border-b border-gray-800">
                <h2 class="text-xl font-black uppercase text-[#ffab00] tracking-wide">✎ Chỉnh sửa Game</h2>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="editGameForm" class="px-6 py-5 space-y-5">
                <input type="hidden" id="editGameId">

                <div id="editStatusBanner" class="hidden px-4 py-3 rounded-lg text-sm font-bold border"></div>

                <div>
                    <label class="form-label" for="editTitle">Tên game <span class="text-red-500">*</span></label>
                    <input id="editTitle" type="text" class="form-input" required>
                </div>

                <div>
                    <label class="form-label" for="editDesc">Mô tả game <span class="text-red-500">*</span></label>
                    <textarea id="editDesc" rows="4" class="form-input resize-none" required></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="form-label" for="editPrice">Giá (VNĐ) <span class="text-red-500">*</span></label>
                        <input id="editPrice" type="number" min="0" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label" for="editCategory">Danh mục <span
                                class="text-red-500">*</span></label>
                        <select id="editCategory" class="form-input" required>
                            <option value="">-- Chọn danh mục --</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="form-label" for="editPcReq">Cấu hình PC yêu cầu</label>
                    <textarea id="editPcReq" rows="3" class="form-input resize-none"></textarea>
                </div>

                <div>
                    <label class="form-label">Ảnh thumbnail hiện tại</label>
                    <img id="editCurrentThumbnail" src="" alt="Current thumbnail"
                        class="w-full h-40 object-cover rounded-lg border border-gray-800 mb-2"
                        onerror="this.style.display='none'">
                    <label for="editThumbnail"
                        class="upload-area flex items-center justify-center gap-2 p-4 text-gray-500 text-sm font-bold mt-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                        Thay ảnh thumbnail (tùy chọn)
                    </label>
                    <input id="editThumbnail" type="file" accept="image/*" class="hidden"
                        onchange="previewEditThumbnail(event)">
                    <img id="editThumbnailPreview" src="" alt="New thumbnail preview"
                        class="hidden w-full h-40 object-cover rounded-lg border border-[#007dfc] mt-2">
                </div>

                <div class="pt-2 flex justify-end gap-3">
                    <button type="button" onclick="closeEditModal()"
                        class="px-5 py-2.5 border border-gray-700 hover:border-gray-500 text-gray-400 hover:text-white rounded-lg font-bold uppercase text-sm transition">
                        Hủy
                    </button>
                    <button type="submit" id="editSubmitBtn"
                        class="flex items-center gap-2 bg-[#ffab00] hover:bg-[#e09900] text-black px-6 py-2.5 rounded-lg font-bold uppercase text-sm transition active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>



    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        // ========================= Auth Guard =========================
        if (!token) {
            window.location.href = '/frontend/login.html';
        }
        if (userRole !== 'Publisher') {
            alert("⚠️ Bạn không có quyền truy cập trang này!");
            window.location.href = '/frontend/index.html';
        }

        let allGames = [];    // cache for filter
        let allCategories = [];

        // ========================= Utils =========================
        function showStatus(msg, isError = false) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = 'mb-6 px-4 py-3 rounded-lg font-bold text-sm border';
            if (isError) {
                el.classList.add('bg-red-500/10', 'text-red-400', 'border-red-500/30');
            } else {
                el.classList.add('bg-green-500/10', 'text-green-400', 'border-green-500/30');
            }
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function formatVND(amount) {
            return new Intl.NumberFormat('vi-VN').format(Number(amount) || 0) + ' VNĐ';
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString('vi-VN');
        }

        function getStatusBadge(status) {
            const map = {
                pending: { cls: 'badge-pending', label: '⏳ Chờ duyệt' },
                approved: { cls: 'badge-approved', label: '✅ Đã duyệt' },
                rejected: { cls: 'badge-rejected', label: '❌ Từ chối' }
            };
            const s = map[status] || { cls: '', label: status };
            return `<span class="inline-block px-2 py-0.5 rounded text-xs font-bold ${s.cls}">${s.label}</span>`;
        }

        // ========================= Load Categories =========================
        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}/category`);
                const result = await res.json();
                if (result.success) {
                    allCategories = result.data;
                    populateCategorySelects();
                }
            } catch (e) {
                console.error('Lỗi tải danh mục:', e);
            }
        }

        function populateCategorySelects() {
            const options = allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
            document.getElementById('editCategory').innerHTML = `<option value="">-- Chọn danh mục --</option>${options}`;
        }

        // ========================= Load My Games =========================
        async function loadMyGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = `
                <div class="game-card glass-card rounded-xl overflow-hidden animate-pulse">
                    <div class="bg-[#222] h-44 w-full"></div>
                    <div class="p-4 space-y-2">
                        <div class="h-4 bg-[#222] rounded w-3/4"></div>
                        <div class="h-3 bg-[#222] rounded w-1/2"></div>
                    </div>
                </div>
                <div class="game-card glass-card rounded-xl overflow-hidden animate-pulse">
                    <div class="bg-[#222] h-44 w-full"></div>
                    <div class="p-4 space-y-2">
                        <div class="h-4 bg-[#222] rounded w-3/4"></div>
                        <div class="h-3 bg-[#222] rounded w-1/2"></div>
                    </div>
                </div>
            `;

            try {
                const res = await fetch(`${API_URL}/publisher/my-games`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();

                if (!result.success) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-400 font-bold">${result.message || 'Lỗi tải dữ liệu'}</div>`;
                    return;
                }

                allGames = result.data || [];
                updateStats(allGames);
                renderGames(allGames);

            } catch (e) {
                console.error('Lỗi:', e);
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-400 font-bold">⚠ Mất kết nối với server</div>`;
            }
        }

        function updateStats(games) {
            document.getElementById('statTotal').textContent = games.length;
            document.getElementById('statApproved').textContent = games.filter(g => g.status === 'approved').length;
            document.getElementById('statPending').textContent = games.filter(g => g.status === 'pending').length;
            document.getElementById('statRejected').textContent = games.filter(g => g.status === 'rejected').length;
        }

        function filterGames() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            let filtered = allGames;

            if (keyword) filtered = filtered.filter(g => g.title.toLowerCase().includes(keyword));
            if (statusFilter) filtered = filtered.filter(g => g.status === statusFilter);

            renderGames(filtered);
        }

        function renderGames(games) {
            const grid = document.getElementById('gamesGrid');

            if (!games || games.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-24 flex flex-col items-center justify-center text-gray-600">
                        <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                                d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <p class="font-bold text-lg">Chưa có game nào</p>
                        <p class="text-sm mt-1 text-gray-700">Hãy tạo game đầu tiên của bạn!</p>
                        <button onclick="openCreateModal()" class="mt-5 bg-[#007dfc] hover:bg-[#0062c4] text-white px-5 py-2.5 rounded-lg font-bold text-sm uppercase transition">
                            + Tạo Game Ngay
                        </button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = games.map(game => {
                // SỬA ĐOẠN NÀY LẠI CHO GIỐNG INDEX.HTML ĐỂ KHÔNG BỊ LỖI ĐƯỜNG DẪN ẢNH
                let thumb = 'https://picsum.photos/400/220?grayscale'; // Dùng một link ảnh placeholder ổn định hơn
                if (game.thumbnail) {
                    thumb = game.thumbnail.startsWith('http') ? game.thumbnail : `http://localhost:5000${game.thumbnail}`;
                }

                const catName = (game.category && game.category.name) ? game.category.name : '—';
                const price = game.price === 0 ? '<span class="text-[#00e676]">FREE</span>' : `<span class="text-[#007dfc]">${formatVND(game.price)}</span>`;

                return `
                    <div class="game-card glass-card rounded-xl overflow-hidden border border-[#1e1e1e] hover:border-[#007dfc]/40">
                        <div class="relative">
                            <img src="${thumb}" alt="${game.title}"
                                class="w-full h-44 object-cover"
                                onerror="this.src='https://picsum.photos/400/220?grayscale'">
                            <div class="absolute top-2 right-2">${getStatusBadge(game.status)}</div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-black text-white text-base leading-tight truncate">${game.title}</h3>
                            <div class="text-xs text-gray-500 mt-0.5 mb-2">${catName}</div>
                            <div class="text-sm font-bold mb-3">${price}</div>
                            <div class="text-xs text-gray-600 mb-3">Ngày tạo: ${formatDate(game.createdAt)}</div>
                            <div class="flex gap-2">
                                <button onclick="openDetailModal('${game._id}')"
                                    class="flex-1 flex items-center justify-center gap-1.5 border border-[#2a2a2a] hover:border-[#007dfc] text-gray-400 hover:text-[#007dfc] py-2 rounded-lg text-xs font-bold uppercase transition">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                    Chi tiết
                                </button>
                                <button onclick="openEditModal('${game._id}')"
                                    class="flex-1 flex items-center justify-center gap-1.5 border border-[#2a2a2a] hover:border-[#ffab00] text-gray-400 hover:text-[#ffab00] py-2 rounded-lg text-xs font-bold uppercase transition">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                    Chỉnh sửa
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========================= Edit Game =========================
        function openEditModal(gameId) {
            const game = allGames.find(g => g._id === gameId);
            if (!game) { showStatus('Không tìm thấy game', true); return; }

            document.getElementById('editGameId').value = gameId;
            document.getElementById('editTitle').value = game.title || '';
            document.getElementById('editDesc').value = game.description || '';
            document.getElementById('editPrice').value = game.price ?? '';
            document.getElementById('editPcReq').value = game.pcRequirements || '';

            // Set category
            const catId = game.category ? (game.category._id || game.category) : '';
            document.getElementById('editCategory').value = catId;

            // Thumbnail
            const thumb = document.getElementById('editCurrentThumbnail');
            if (game.thumbnail) {
                thumb.src = game.thumbnail.startsWith('http') ? game.thumbnail : `http://localhost:5000${game.thumbnail}`;
                thumb.style.display = 'block';
            } else {
                thumb.style.display = 'none';
            }
            document.getElementById('editThumbnailPreview').classList.add('hidden');
            document.getElementById('editThumbnail').value = '';

            // Status banner
            const banner = document.getElementById('editStatusBanner');
            if (game.status === 'approved') {
                banner.textContent = '✅ Game đã được duyệt. Chỉnh sửa sẽ đặt lại trạng thái chờ duyệt.';
                banner.className = 'px-4 py-3 rounded-lg text-sm font-bold border badge-approved';
                banner.classList.remove('hidden');
            } else if (game.status === 'pending') {
                banner.textContent = '⏳ Game đang chờ duyệt từ Admin.';
                banner.className = 'px-4 py-3 rounded-lg text-sm font-bold border badge-pending';
                banner.classList.remove('hidden');
            } else if (game.status === 'rejected') {
                banner.textContent = '❌ Game bị từ chối. Hãy chỉnh sửa và gửi lại.';
                banner.className = 'px-4 py-3 rounded-lg text-sm font-bold border badge-rejected';
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }

            document.getElementById('editModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function previewEditThumbnail(event) {
            const file = event.target.files[0];
            if (!file) return;
            const preview = document.getElementById('editThumbnailPreview');
            preview.src = URL.createObjectURL(file);
            preview.classList.remove('hidden');
        }

        document.getElementById('editGameForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const gameId = document.getElementById('editGameId').value;
            const btn = document.getElementById('editSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg> Đang lưu...`;

            try {
                const formData = new FormData();
                formData.append('title', document.getElementById('editTitle').value.trim());
                formData.append('description', document.getElementById('editDesc').value.trim());
                formData.append('price', document.getElementById('editPrice').value);
                formData.append('category', document.getElementById('editCategory').value);
                formData.append('pcRequirements', document.getElementById('editPcReq').value.trim());

                const thumbnail = document.getElementById('editThumbnail').files[0];
                if (thumbnail) formData.append('thumbnail', thumbnail);

                const res = await fetch(`${API_URL}/games/${gameId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const result = await res.json();

                if (result.success) {
                    showStatus('✅ Cập nhật game thành công!', false);
                    closeEditModal();
                    loadMyGames();
                } else {
                    showStatus(result.message || 'Lỗi cập nhật', true);
                }
            } catch (err) {
                console.error(err);
                showStatus('⚠ Lỗi kết nối với server', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Lưu thay đổi`;
            }
        });

        // ========================= Detail Modal =========================
        function openDetailModal(gameId) {
            window.location.href = `GameDetail.html?id=${gameId}`;
        }

        // Close modals on backdrop click
        ['editModal'].forEach(id => {
            document.getElementById(id).addEventListener('click', function (e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                    document.body.style.overflow = '';
                }
            });
        });

        // ========================= Init =========================
        loadCategories();
        loadMyGames();
    </script>

    <script src="../layout.js"></script>
</body>

</html>
