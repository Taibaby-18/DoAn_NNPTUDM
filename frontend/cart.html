<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng | Taibaby-18 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; }
        .epic-btn { background-color: #007dfc; transition: 0.3s; }
        .epic-btn:hover { background-color: #0062c4; }
    </style>
</head>
<body>
    <nav class="bg-[#181818] p-4 flex justify-between items-center px-12 sticky top-0 z-50 border-b border-gray-800">
        <div class="flex items-center gap-8">
            <span class="text-xl font-black tracking-widest text-white">TAIBABY-18 STORE</span>
            <a href="index.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Khám phá</a>
            <a href="cart.html" class="text-white uppercase text-xs font-bold border-b-2 border-white pb-1">Giỏ hàng</a>
            <a href="library.html" class="text-gray-400 hover:text-white uppercase text-xs font-bold">Thư viện</a>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="userName" class="text-sm font-bold uppercase">OPERATOR</p>
                <p id="userBalance" class="text-[#007dfc] text-xs font-bold">$0.00</p>
            </div>
            <button onclick="logout()" class="bg-gray-800 px-3 py-1 text-xs rounded hover:bg-red-600 transition">Thoát</button>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto py-12 px-6 min-h-screen">
        <h1 class="text-3xl font-black italic mb-8 uppercase border-l-4 border-[#007dfc] pl-4">Giỏ hàng của bạn</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2">
                <div id="cartItems" class="space-y-4">
                    <p class="text-gray-500 animate-pulse">Đang nạp dữ liệu giỏ hàng...</p>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-[#181818] p-6 rounded-lg border border-gray-800 sticky top-24 shadow-xl">
                    <h2 class="text-xl font-bold mb-6 border-b border-gray-700 pb-4 uppercase tracking-widest">Tóm tắt đơn hàng</h2>
                    
                    <div class="flex justify-between mb-4">
                        <span class="text-gray-400">Số lượng game</span>
                        <span id="cartCount" class="font-bold">0</span>
                    </div>
                    
                    <div class="flex justify-between mb-6 border-b border-gray-700 pb-4">
                        <span class="text-gray-400">Thuế & Phí</span>
                        <span class="font-bold text-green-500">Miễn phí</span>
                    </div>

                    <div class="flex justify-between items-center mb-8">
                        <span class="font-bold text-lg uppercase">Tổng cộng</span>
                        <span id="cartTotal" class="text-3xl font-black text-white">$0.00</span>
                    </div>

                    <button onclick="checkoutCart()" class="w-full epic-btn text-white font-bold py-4 rounded uppercase tracking-widest text-sm hover:scale-[1.02] active:scale-95 transition-all">
                        Thanh Toán Toàn Bộ
                    </button>
                    
                    <p id="checkoutMsg" class="text-red-500 text-xs mt-4 text-center hidden"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:5000/api";
        const token = localStorage.getItem('token');
        if(!token) window.location.href = 'login.html';

        // Đây là cái ảnh "Khiên đỡ đạn", chỉ hiện ra khi ảnh gốc bị lỗi
        const FALLBACK_IMAGE = 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=400';

        window.onload = () => {
            loadUserProfile();
            loadCart();
        };

        // 1. Tải thông tin User (lấy ví tiền)
        async function loadUserProfile() {
            try {
                const res = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profile = await res.json();
                if(profile.success) {
                    document.getElementById('userName').innerText = profile.data.username;
                    const balance = profile.data.walletBalance || 0;
                    document.getElementById('userBalance').innerText = `$${balance.toFixed(2)}`;
                } else {
                    logout();
                }
            } catch (err) { console.error(err); }
        }

        // 2. Lấy dữ liệu Giỏ hàng
        async function loadCart() {
            try {
                const res = await fetch(`${API_URL}/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                
                const cartContainer = document.getElementById('cartItems');
                
                if (result.success && result.cart && result.cart.length > 0) {
                    // Cập nhật số lượng và tổng tiền
                    document.getElementById('cartCount').innerText = result.cart.length;
                    document.getElementById('cartTotal').innerText = `$${result.totalPrice.toFixed(2)}`;

                    // Hiển thị danh sách game
                    cartContainer.innerHTML = result.cart.map(game => {
                        
                        // Ưu tiên lấy ảnh thật của game (thumbnail hoặc imageUrl)
                        let imgSrc = FALLBACK_IMAGE;
                        if (game.thumbnail) {
                            imgSrc = game.thumbnail.startsWith('http') ? game.thumbnail : `http://localhost:5000${game.thumbnail}`;
                        } else if (game.imageUrl) {
                            imgSrc = game.imageUrl.startsWith('http') ? game.imageUrl : `http://localhost:5000${game.imageUrl}`;
                        }

                        const title = game.title || 'Game chưa có tên';
                        const price = game.price !== undefined ? game.price : 0;

                        return `
                        <div class="flex gap-4 bg-[#181818] p-4 rounded-lg border border-gray-800 items-center group hover:border-gray-600 transition">
                            <div class="w-40 aspect-video bg-[#202020] rounded flex-shrink-0 overflow-hidden relative">
                                <img src="${imgSrc}" onerror="this.onerror=null; this.src='${FALLBACK_IMAGE}'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                            </div>
                            <div class="flex-grow">
                                <span class="text-[10px] text-gray-500 font-bold uppercase">Bản cơ bản</span>
                                <h3 class="font-bold text-lg hover:text-[#007dfc] cursor-pointer transition"><a href="detail.html?id=${game._id}">${title}</a></h3>
                                <button onclick="removeFromCart('${game._id}')" class="text-xs text-gray-500 hover:text-red-500 mt-2 underline transition">Xóa khỏi giỏ</button>
                            </div>
                            <div class="text-2xl font-black text-white min-w-[100px] text-right">
                                $${price}
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    // Giỏ hàng trống
                    cartContainer.innerHTML = `
                        <div class="text-center py-20 bg-[#181818] rounded-lg border border-gray-800">
                            <span class="material-symbols-outlined text-6xl text-gray-600 mb-4 block">shopping_cart</span>
                            <h2 class="text-xl font-bold mb-2">Giỏ hàng của bạn đang trống</h2>
                            <p class="text-gray-400 mb-6">Hãy dạo một vòng cửa hàng để tìm cho mình tựa game yêu thích nhé!</p>
                            <a href="index.html" class="bg-[#007dfc] text-white px-8 py-3 rounded font-bold hover:bg-[#0062c4] transition uppercase text-sm">Đi tới Cửa hàng</a>
                        </div>
                    `;
                    document.getElementById('cartCount').innerText = '0';
                    document.getElementById('cartTotal').innerText = '$0.00';
                }
            } catch (err) {
                document.getElementById('cartItems').innerHTML = `<p class="text-red-500">Lỗi kết nối máy chủ!</p>`;
            }
        }

        // 3. Thanh toán toàn bộ giỏ hàng
        async function checkoutCart() {
            const msgEl = document.getElementById('checkoutMsg');
            msgEl.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/cart/checkout`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await res.json();
                
                if (data.success) {
                    alert("🎉 Thanh toán giỏ hàng thành công! Các game đã được chuyển vào Thư viện.");
                    loadUserProfile(); 
                    loadCart();        
                } else {
                    msgEl.innerText = data.message || "Giao dịch thất bại. Ví không đủ tiền!";
                    msgEl.classList.remove('hidden');
                }
            } catch (err) {
                msgEl.innerText = "Lỗi kết nối server!";
                msgEl.classList.remove('hidden');
            }
        }

        // 4. Hàm xóa game khỏi giỏ (Đã kết nối API)
async function removeFromCart(gameId) {
    if(!confirm("Ông có chắc muốn bỏ con game này khỏi giỏ không?")) return;

    try {
        const res = await fetch(`${API_URL}/cart/remove`, {
            method: 'POST', // Khớp với router ở Bước 2
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ gameId })
        });
        const data = await res.json();
        
        if (data.success) {
            // Xóa xong thì load lại giỏ hàng cho nó biến mất khỏi màn hình
            loadCart(); 
        } else {
            alert(data.message);
        }
    } catch (err) {
        alert("Lỗi kết nối server!");
    }
}

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
